<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Produto artesanal da Tia Bete Bolos. Encomende pelo WhatsApp!"/>
  <title>Produto | Tia Bete Bolos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/catalog.css"/>
</head>
<body>

  <main id="main">

    <!-- DETALHE DO PRODUTO -->
    <section class="product-detail" aria-label="Detalhe do produto">
      <div class="container">

        <!-- Breadcrumb (preenchido pelo JS) -->
        <nav class="product-detail__breadcrumb" id="breadcrumb" aria-label="Você está em"></nav>

        <div class="product-detail__inner">

          <!-- IMAGEM (esquerda) -->
          <div class="product-detail__img-wrap" id="product-img-wrap">
            <div class="product-detail__img-placeholder" id="product-placeholder">
              <span id="product-emoji">🎂</span>
            </div>
          </div>

          <!-- INFO (direita) -->
          <div class="product-detail__info">
            <span class="product-detail__category" id="product-category">Categoria</span>
            <h1 class="product-detail__title" id="product-title">Carregando...</h1>
            <p class="product-detail__desc" id="product-desc">Carregando descrição...</p>

            <div class="product-detail__cta">
              <span class="product-detail__cta-label">Quer este produto?</span>
              <a href="#" id="product-wa-btn" class="btn btn--primary btn--lg" target="_blank" rel="noopener noreferrer">
                💬 Peça já o seu pelo WhatsApp
              </a>
              <p class="product-detail__cta-note" id="product-cta-note">
                Atendemos por encomenda · (11) 97271-0172
              </p>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- RECOMENDADOS -->
    <section class="product-recommended" id="recommended-section" aria-label="Outros produtos">
      <div class="container">
        <div class="product-recommended__header">
          <span class="section-label" id="recommended-label">Veja também</span>
          <h2 class="section-title">Você também <em>vai amar</em></h2>
        </div>
        <div class="catalog-grid" id="recommended-grid">
          <!-- Preenchido pelo JS -->
        </div>
      </div>
    </section>

  </main>

  <footer id="main-footer"></footer>

  <script src="../js/nav.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/produtos.js"></script>
</body>
</html>
