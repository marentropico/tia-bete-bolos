<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Bolos artesanais da Tia Bete — simples, recheados e de festa. Encomende pelo WhatsApp!"/>
  <title>Bolos | Tia Bete Bolos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/catalog.css"/>
</head>
<body>

  <main id="main">

    <!-- HERO -->
    <section class="catalog-hero" aria-label="Bolos artesanais">
      <div class="container">
        <span class="catalog-hero__eyebrow">✦ Feitos com amor · Desde 2000</span>
        <h1 class="catalog-hero__title">Nossos <em>Bolos</em></h1>
        <p class="catalog-hero__desc">Bolos simples do dia a dia, recheados especiais e bolos de festa com decoração personalizada. Encomende o seu!</p>
      </div>
    </section>

    <!-- FILTROS -->
    <div class="catalog-filters" role="navigation" aria-label="Filtrar por categoria">
      <div class="container catalog-filters__inner">
        <button class="catalog-filter-btn is-active" data-filter="todos">Todos</button>
        <button class="catalog-filter-btn" data-filter="simples">🍰 Bolos Simples</button>
        <button class="catalog-filter-btn" data-filter="recheados">🎂 Bolos Recheados</button>
        <button class="catalog-filter-btn" data-filter="festa">🎉 Bolos de Festa</button>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="container" style="padding-top: var(--space-8); padding-bottom: var(--space-24);">

      <!-- BOLOS SIMPLES -->
      <section class="catalog-section" data-category="simples" aria-labelledby="cat-simples">
        <div class="catalog-section__header">
          <h2 class="catalog-section__title" id="cat-simples">Bolos <em>Simples</em></h2>
          <span class="catalog-section__count">6 produtos</span>
        </div>
        <!-- INJEÇÃO VIA JS -->
        <div class="catalog-grid"></div>
      </section>

      <!-- BOLOS RECHEADOS -->
      <section class="catalog-section" data-category="recheados" aria-labelledby="cat-recheados">
        <div class="catalog-section__header">
          <h2 class="catalog-section__title" id="cat-recheados">Bolos <em>Recheados</em></h2>
          <span class="catalog-section__count">8 produtos</span>
        </div>
        <!-- INJEÇÃO VIA JS -->
        <div class="catalog-grid"></div>
      </section>

      <!-- BOLOS DE FESTA -->
      <section class="catalog-section" data-category="festa" aria-labelledby="cat-festa">
        <div class="catalog-section__header">
          <h2 class="catalog-section__title" id="cat-festa">Bolos de <em>Festa</em></h2>
          <span class="catalog-section__count">Sob encomenda</span>
        </div>
        <!-- INJEÇÃO VIA JS -->
        <div class="catalog-grid"></div>
      </section>

    </div><!-- /container -->
  </main>

  <footer id="main-footer"></footer>

  <script src="../js/nav.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/whatsapp.js"></script>
  <script src="../js/catalog.js"></script>
</body>
</html>
